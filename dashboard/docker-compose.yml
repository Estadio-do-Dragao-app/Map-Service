version: '3.8'

services:
  dashboard-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-backend
    ports:
      - "8015:8000"   # Host 8015 -> container 8000 (evita conflito com outros servicos)
    environment:
      MAP_SERVICE_URL: http://host.docker.internal:8000
    # Para Linux, é necessário adicionar isto para que host.docker.internal funcione:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped